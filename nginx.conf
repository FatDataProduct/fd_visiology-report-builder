server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ── Gzip compression ───────────────────────────────────────────────────
    # Reduces payload: JS/CSS ~70 %, HTML ~60 %, SVG/XML ~65 %
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_min_length   1024;
    gzip_comp_level   6;
    gzip_buffers      16 8k;
    gzip_http_version 1.1;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/json
        application/xml
        application/xml+rss
        application/xhtml+xml
        image/svg+xml
        font/woff
        font/woff2;

    # ── Security headers (applied to every response via add_header + always) ─
    add_header X-Frame-Options           "SAMEORIGIN"                         always;
    add_header X-Content-Type-Options    "nosniff"                            always;
    add_header X-XSS-Protection          "1; mode=block"                      always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"    always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;

    # ── robots.txt — no-cache so Googlebot always gets the latest ──────────
    location = /robots.txt {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma        "no-cache";
        expires 0;
        try_files $uri =404;
    }

    # ── sitemap.xml — short TTL (1 day) ────────────────────────────────────
    location = /sitemap.xml {
        add_header Content-Type  "application/xml; charset=utf-8";
        add_header Cache-Control "public, max-age=86400";
        try_files $uri =404;
    }

    # ── HTML — no-cache so the SSR pre-rendered snapshot is always fresh ───
    # This is critical: browsers/CDNs should not cache the HTML document.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma        "no-cache";
        expires 0;
        try_files $uri =404;
    }

    # ── Hashed JS/CSS/media assets — immutable long-term cache ─────────────
    # Vite fingerprints every asset filename; changing content = new filename.
    location ~* \.(js|css|woff2?|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # ── Images & icons — 30-day cache ──────────────────────────────────────
    location ~* \.(png|jpg|jpeg|gif|ico|svg|webp|avif)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        try_files $uri =404;
    }

    # ── SPA fallback — all non-file paths serve index.html ─────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
